
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自己紹介サイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ヘッダー -->
    <header>
        <h1>MY PROFILE</h1>
        <p>ようこそ！自己紹介サイトへ</p>
    </header>

    <!-- 自己紹介 -->
    <section class="profile">
        <img src="img/channels4_profile.jpg" alt="プロフィール画像">

        <div class="profile-text">
            <h2>小林 太郎</h2>
            <p>
                こんにちは！<br>
                趣味はゲーム、音楽、プログラミングです。<br>
                HTML・CSS・Javaを勉強中です！
            </p>
        </div>
    </section>

    <!-- 趣味 -->
    <section class="hobby">
        <h2>趣味</h2>

        <div class="cards">

            <div class="card">
                <img src="img/game.jpg" alt="ゲーム">
                <h3>ゲーム</h3>
                <p>FPSやRPGが好きです！</p>
            </div>

            <div class="card">
                <img src="img/music.jpg" alt="音楽">
                <h3>音楽</h3>
                <p>毎日音楽を聴いています。</p>
            </div>

            <div class="card">
                <img src="img/programming.jpg" alt="プログラミング">
                <h3>プログラミング</h3>
                <p>Web制作やJavaを勉強しています。</p>
            </div>

        </div>
    </section>

    <!-- フッター -->
    <footer>
        <p>&copy; 2026 My Profile</p>
    </footer>

</body>
</html>
